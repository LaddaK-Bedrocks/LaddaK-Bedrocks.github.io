<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Thai',-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0d5230 0%,#1b8a44 55%,#3aa968 100%);color:#1d2433;padding:24px}
.card{background:#fff;border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.28);max-width:560px;width:100%;padding:46px 44px;text-align:center}

a.btn .t{font-size:15.5px;font-weight:600}
a.btn .d{font-size:12.5px;color:#6b7487;font-weight:300}
.ftr{margin-top:30px;font-size:12px;color:#8a92a6;font-weight:300}

</head>

  <div class="card">

      <svg viewBox="0 0 205 60" width="170" height="52" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="9NANTH นัยน์นันท์">

          <path d="M -14 17 Q -20 26 -27 27" fill="none" stroke="#8fcfa8" stroke-width="7" stroke-linecap="round"/>

      </svg>

    <div class="links">
      <a class="btn" href="user_dashboard.html">
        <span class="ic">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1b8a44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>

        </span>
